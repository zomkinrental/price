<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zomkin Rental — калькулятор аренды</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.min.js"></script>
  <style>
    :root{--bg:#f6f6f3;--card:#fff;--text:#171717;--muted:#777;--line:#e7e3da;--accent:#111;--radius:18px;--shadow:0 12px 30px rgba(0,0,0,.06)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:150px}
    header{padding:28px 20px 18px;max-width:1180px;margin:auto}.brand{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.logo{font-size:28px;font-weight:800;letter-spacing:-.04em}.tag{color:var(--muted);margin-top:6px}.top-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:999px;background:var(--accent);color:#fff;padding:12px 16px;font-weight:700;cursor:pointer}.btn.secondary{background:#fff;color:#111;border:1px solid var(--line)}
    .controls{max-width:1180px;margin:8px auto 20px;padding:0 20px;display:grid;grid-template-columns:1fr 180px 180px;gap:12px}.input{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px 16px;font-size:15px;outline:none}
    main{max-width:1180px;margin:auto;padding:0 20px}.category{margin:26px 0}.cat-title{font-size:22px;font-weight:800;margin:0 0 12px;letter-spacing:-.03em}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.name{font-size:17px;font-weight:800}.desc{color:var(--muted);font-size:13px;margin-top:5px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{font-size:12px;border-radius:999px;background:#f3f1ec;padding:6px 9px}.price{font-weight:800}.qty{display:flex;align-items:center;gap:8px}.circle{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;cursor:pointer}.count{min-width:26px;text-align:center;font-weight:800}.empty{padding:28px;background:#fff;border-radius:var(--radius);border:1px solid var(--line);color:var(--muted)}
    .summary{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:10}.summary-inner{max-width:1180px;margin:auto;padding:14px 20px;display:grid;grid-template-columns:1fr 150px 150px 180px;gap:12px;align-items:end}.sum-title{font-size:13px;color:var(--muted)}.sum-value{font-size:26px;font-weight:900;letter-spacing:-.04em}.small{font-size:12px;color:var(--muted);margin-top:2px}.selected-list{max-height:68px;overflow:auto;font-size:13px;color:var(--muted);margin-top:4px}.hidden{display:none!important}
    @media(max-width:760px){.brand{display:block}.top-actions{margin-top:16px}.controls{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.item{grid-template-columns:1fr}.summary-inner{grid-template-columns:1fr 1fr}.summary-inner .project{grid-column:1/-1}.summary-inner button{grid-column:1/-1}.logo{font-size:25px}}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div><div class="logo">Zomkin Rental</div><div class="tag">Калькулятор аренды техники и генератор сметы</div></div>
      <div class="top-actions"><button class="btn secondary" onclick="clearCart()">Очистить</button><button class="btn" onclick="downloadPDF()">Скачать PDF</button></div>
    </div>
  </header>

  <section class="controls">
    <input id="search" class="input" placeholder="Поиск техники..." oninput="render()" />
    <input id="shootDays" class="input" type="number" min="1" value="1" onchange="renderSummary()" placeholder="Смен" />
    <input id="discount" class="input" type="number" min="0" max="100" value="0" onchange="renderSummary()" placeholder="Скидка %" />
  </section>

  <main id="app"><div class="empty">Загрузка прайса...</div></main>

  <section class="summary">
    <div class="summary-inner">
      <div class="project">
        <input id="projectName" class="input" placeholder="Название проекта / клиент" />
        <div id="selectedList" class="selected-list">Позиции не выбраны</div>
      </div>
      <div><div class="sum-title">Скидка</div><div id="discountSum" class="sum-value">0 ₽</div></div>
      <div><div class="sum-title">Итого</div><div id="totalSum" class="sum-value">0 ₽</div><div class="small">за выбранные смены</div></div>
      <button class="btn" onclick="downloadPDF()">Смета PDF</button>
    </div>
  </section>

<script>
  // 1) ВСТАВЬ СЮДА ССЫЛКУ НА CSV ИЗ GOOGLE SHEETS
  // Пример: const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/.../pub?output=csv';
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA9E92AjFTcJOFrCtWKVnnKCfB5qlZ2BfSCsiRx2NtI1nMNHMjrLzXNPAILtoTFbHfr4Y0red9mxtv/pub?output=csv';

  // 2) Если CSV_URL пустой, сайт покажет демо-позиции
  const DEMO_DATA = [
    {category:'Камеры', name:'Sony FX3', description:'body only', stock:1, price:8000},
    {category:'Камеры', name:'Sony A7S III', description:'body only', stock:1, price:7000},
    {category:'Оптика', name:'Tamron 17-28mm f/2.8', description:'Sony E', stock:1, price:2500},
    {category:'Оптика', name:'Viltrox 16mm f/1.8', description:'Sony E', stock:1, price:2000},
    {category:'Свет', name:'Amaran 300c', description:'RGB COB', stock:2, price:3000},
    {category:'Свет', name:'Godox Knowled 150S', description:'LED mat', stock:2, price:2500},
    {category:'Мониторы', name:'DJI High-Bright Monitor', description:'для площадки', stock:1, price:2500},
    {category:'Видео-сендеры', name:'DJI SDR Combo', description:'передатчик + приемник', stock:1, price:3500}
  ];

  let items = [];
  let cart = JSON.parse(localStorage.getItem('zomkin_cart') || '{}');

  function normalizeRow(row){
    const get = (...keys) => keys.map(k => row[k]).find(v => v !== undefined && v !== '');
    return {
      category: String(get('Категория','category','Category') || 'Без категории').trim(),
      name: String(get('Название','name','Name') || '').trim(),
      description: String(get('Описание','description','Description') || '').trim(),
      stock: Number(String(get('Наличие','stock','Stock') || 1).replace(',', '.')) || 1,
      price: Number(String(get('Цена','price','Price') || 0).replace(/[^0-9.,]/g,'').replace(',', '.')) || 0
    };
  }

  async function loadData(){
    if(!CSV_URL){ items = DEMO_DATA; render(); return; }
    const separator = CSV_URL.includes('?') ? '&' : '?';
    Papa.parse(CSV_URL + separator + 'cacheBust=' + Date.now(), {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: res => { items = res.data.map(normalizeRow).filter(x => x.name); render(); },
      error: () => { items = DEMO_DATA; render(); alert('Не удалось загрузить CSV. Показаны демо-позиции.'); }
    });
  }

  function format(n){ return new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ₽'; }
  function key(item){ return item.category + '|' + item.name; }
  function save(){ localStorage.setItem('zomkin_cart', JSON.stringify(cart)); }

  function changeQty(k, delta, max){
    const current = cart[k] || 0;
    const next = Math.max(0, Math.min(max, current + delta));
    if(next === 0) delete cart[k]; else cart[k] = next;
    save(); render();
  }

  function render(){
    const q = document.getElementById('search').value.toLowerCase().trim();
    const filtered = items.filter(i => (i.name + ' ' + i.description + ' ' + i.category).toLowerCase().includes(q));
    const groups = filtered.reduce((acc, item) => { (acc[item.category] ||= []).push(item); return acc; }, {});
    const app = document.getElementById('app');
    if(!filtered.length){ app.innerHTML = '<div class="empty">Ничего не найдено</div>'; renderSummary(); return; }
    app.innerHTML = Object.entries(groups).map(([cat, arr]) => `
      <section class="category">
        <h2 class="cat-title">${cat}</h2>
        <div class="grid">
          ${arr.map(item => {
            const k = key(item); const qty = cart[k] || 0;
            return `<article class="item">
              <div>
                <div class="name">${item.name}</div>
                <div class="desc">${item.description || ''}</div>
                <div class="meta"><span class="pill">В наличии: ${item.stock}</span><span class="pill price">${format(item.price)} / смена</span></div>
              </div>
              <div class="qty">
                <button class="circle" onclick="changeQty('${escapeAttr(k)}',-1,${item.stock})">−</button>
                <div class="count">${qty}</div>
                <button class="circle" onclick="changeQty('${escapeAttr(k)}',1,${item.stock})">+</button>
              </div>
            </article>`
          }).join('')}
        </div>
      </section>`).join('');
    renderSummary();
  }

  function escapeAttr(s){ return s.replace(/'/g, "\\'"); }

  function selectedItems(){
    return items.map(item => ({...item, qty: cart[key(item)] || 0})).filter(i => i.qty > 0);
  }

  function calc(){
    const days = Math.max(1, Number(document.getElementById('shootDays').value) || 1);
    const discount = Math.max(0, Math.min(100, Number(document.getElementById('discount').value) || 0));
    const subtotal = selectedItems().reduce((s,i) => s + i.price * i.qty * days, 0);
    const discountValue = subtotal * discount / 100;
    return {days, discount, subtotal, discountValue, total: subtotal - discountValue};
  }

  function renderSummary(){
    const selected = selectedItems(); const c = calc();
    document.getElementById('discountSum').textContent = format(c.discountValue);
    document.getElementById('totalSum').textContent = format(c.total);
    document.getElementById('selectedList').textContent = selected.length ? selected.map(i => `${i.name} × ${i.qty}`).join(', ') : 'Позиции не выбраны';
  }

  function clearCart(){ cart = {}; save(); render(); }

  function downloadPDF(){
    const selected = selectedItems();
    if(!selected.length){ alert('Сначала выбери технику'); return; }
    const c = calc(); const project = document.getElementById('projectName').value || 'Без названия';
    const rows = selected.map(i => [i.category, i.name, String(i.qty), format(i.price), format(i.price*i.qty*c.days)]);
    const doc = {
      content: [
        {text:'Zomkin Rental', style:'brand'},
        {text:'Смета аренды техники', style:'title'},
        {text:`Проект: ${project}\nДата: ${new Date().toLocaleDateString('ru-RU')}\nКоличество смен: ${c.days}`, margin:[0,0,0,16]},
        {table:{headerRows:1,widths:['auto','*','auto','auto','auto'],body:[['Категория','Позиция','Кол-во','Цена','Сумма'],...rows]}},
        {text:`\nСумма без скидки: ${format(c.subtotal)}`, alignment:'right'},
        {text:`Скидка ${c.discount}%: ${format(c.discountValue)}`, alignment:'right'},
        {text:`Итого: ${format(c.total)}`, style:'total', alignment:'right'},
        {text:'\nСмета не является резервом техники. Наличие и финальные условия подтверждаются менеджером.', style:'note'}
      ],
      styles:{brand:{fontSize:22,bold:true},title:{fontSize:16,bold:true,margin:[0,8,0,12]},total:{fontSize:18,bold:true,margin:[0,8,0,0]},note:{fontSize:9,color:'#777'}},
      defaultStyle:{font:'Roboto',fontSize:10}
    };
    pdfMake.createPdf(doc).download(`smeta-zomkin-rental-${project}.pdf`);
  }

  loadData();
</script>
</body>
</html>
