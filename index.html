<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Прайс техники Zomkin Rental: выбор позиций, расчёт сметы и скачивание PDF." />
  <title>Прайс техники Zomkin Rental</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f0f0f0;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 1.25rem; padding-bottom: 2rem; }
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 1rem 1.25rem;
      margin: -1.25rem -1.25rem 1.5rem -1.25rem;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; text-align: center; }
    .error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.45;
      border: 1px solid rgba(185,28,28,0.2);
    }
    .category {
      background: #fff;
      border-radius: 10px;
      padding: 0 1.25rem 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .category-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1a1a1a;
      padding: 1rem 0 0.75rem;
      border-bottom: 2px solid #1a1a1a;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .row-header {
      display: grid;
      grid-template-columns: 1fr 3rem 4.25rem 7.5rem;
      gap: 0.5rem 0.75rem;
      padding: 0.3rem 0 0.45rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .row-header .row-header-availability,
    .row-header .row-header-price { text-align: right; }
    .row-header .row-header-qty { text-align: center; }
    .row {
      display: grid;
      grid-template-columns: 1fr 3rem 4.25rem 7.5rem;
      gap: 0.5rem 0.75rem;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9375rem;
    }
    .row:last-child { border-bottom: none; }
    .row-name { min-width: 0; line-height: 1.4; }
    .row-name span { display: block; color: #666; font-size: 0.8125rem; margin-top: 0.2rem; }
    .row-availability { text-align: right; white-space: nowrap; color: #777; font-variant-numeric: tabular-nums; font-size: 0.8rem; }
    .row-price {
      text-align: right;
      white-space: nowrap;
      color: #1a1a1a;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .row-qty {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }
    .row-qty .qty-btn {
      width: 2rem;
      height: 2rem;
      min-width: 2rem;
      min-height: 2rem;
      padding: 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #1a1a1a;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .row-qty .qty-btn:hover { background: #f5f5f5; border-color: #999; }
    .row-qty .qty-btn:active { background: #eee; }
    .row-qty .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .row-qty input {
      width: 2.5rem;
      padding: 0.4rem 0.25rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-align: center !important;
      font-size: 0.9375rem;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }
    .row-qty input::-webkit-outer-spin-button,
    .row-qty input::-webkit-inner-spin-button { margin: 0; -webkit-appearance: none; }
    .row-qty input:hover { border-color: #999; }
    .row-qty input:focus {
      outline: none;
      border-color: #1a1a1a;
      box-shadow: 0 0 0 2px rgba(26,26,26,0.15);
    }
    .total-wrap {
      position: sticky;
      bottom: 0;
      background: #1a1a1a;
      color: #fff;
      padding: 1rem 1.25rem;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
      margin: 0 -1.25rem -2rem -1.25rem;
      border-radius: 10px 10px 0 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    }
    .total-wrap .total-left { flex: 1; min-width: 0; }
    .total-wrap .label { font-size: 0.875rem; opacity: 0.92; }
    .total-wrap .sum { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 0.1rem; font-variant-numeric: tabular-nums; }
    .total-wrap .discount-row, .total-wrap .shifts-row { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .total-wrap .btn-pdf {
      background: #fff;
      color: #1a1a1a;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .total-wrap .btn-pdf:hover { background: #eee; }
    .total-wrap .btn-pdf:active { transform: scale(0.98); }
    .total-wrap .discount-row .label, .total-wrap .shifts-row .label { font-size: 0.875rem; }
    .total-wrap .discount-input, .total-wrap .shifts-input {
      width: 4.5rem;
      padding: 0.4rem 0.5rem;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 0.9375rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .total-wrap .discount-input::placeholder, .total-wrap .shifts-input::placeholder { color: rgba(255,255,255,0.55); }
    .total-wrap .discount-input:focus, .total-wrap .shifts-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.18);
    }
    .total-wrap .sum-discount { font-size: 0.9375rem; opacity: 0.95; margin-top: 0.2rem; font-variant-numeric: tabular-nums; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar-project { display: flex; align-items: center; gap: 0.5rem; min-width: 0; flex: 1; max-width: 20rem; }
    .toolbar-project label { font-size: 0.875rem; color: #555; white-space: nowrap; }
    .toolbar-project input { flex: 1; min-width: 0; padding: 0.5rem 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9375rem; }
    .toolbar-project input::placeholder { color: #999; }
    .toolbar-project input:focus { outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 2px rgba(26,26,26,0.1); }
    .btn-clear {
      padding: 0.5rem 1rem;
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-clear:hover { background: #f5f5f5; border-color: #999; }
    .loading { text-align: center; padding: 3rem 1rem; color: #666; font-size: 0.9375rem; }

    @media (max-width: 640px) {
      .wrap { padding: 0.75rem; padding-bottom: 1.5rem; }
      header { padding: 0.75rem 1rem; margin: -0.75rem -0.75rem 1rem -0.75rem; border-radius: 0 0 8px 8px; }
      header h1 { font-size: 1.1rem; }
      .category { padding: 0 0.75rem 1rem; margin-bottom: 1rem; border-radius: 8px; }
      .category-title { font-size: 1rem; padding: 0.75rem 0 0.5rem; }
      .row-header { grid-template-columns: 1fr 2.5rem 3.5rem 8.5rem; gap: 0.35rem 0.5rem; padding: 0.25rem 0 0.35rem; font-size: 0.6rem; }
      .row { grid-template-columns: 1fr 2.5rem 3.5rem 8.5rem; gap: 0.35rem 0.5rem; padding: 0.45rem 0; font-size: 0.875rem; }
      .row-name span { font-size: 0.75rem; }
      .row-availability { font-size: 0.75rem; }
      .row-price { font-size: 0.875rem; }
      .row-qty .qty-btn { width: 2.5rem; height: 2.5rem; min-width: 2.5rem; min-height: 2.5rem; font-size: 1.25rem; }
      .row-qty input { width: 2.5rem; padding: 0.4rem 0.1rem; font-size: 1rem; min-height: 2.5rem; }
      .total-wrap { padding: 0.75rem 1rem; margin: 0 -0.75rem -1.5rem -0.75rem; gap: 0.75rem 1rem; border-radius: 8px 8px 0 0; }
      .total-wrap .label { font-size: 0.8125rem; }
      .total-wrap .sum { font-size: 1.5rem; }
      .total-wrap .sum-discount { font-size: 0.875rem; }
      .total-wrap .btn-pdf { padding: 0.6rem 1rem; font-size: 0.875rem; min-height: 2.75rem; }
      .total-wrap .discount-input, .total-wrap .shifts-input { width: 3.75rem; padding: 0.45rem 0.4rem; font-size: 1rem; min-height: 2.25rem; }
      .toolbar { margin-bottom: 0.75rem; gap: 0.75rem; }
      .toolbar-project { max-width: none; }
      .toolbar-project input { font-size: 1rem; min-height: 2.5rem; }
      .btn-clear { padding: 0.5rem 0.75rem; font-size: 0.8125rem; min-height: 2.5rem; }
      .loading { padding: 2rem 0.75rem; font-size: 0.875rem; }
    }

    @media (max-width: 400px) {
      .wrap { padding: 0.5rem; padding-bottom: 1.25rem; }
      header { padding: 0.6rem 0.75rem; margin: -0.5rem -0.5rem 0.75rem -0.5rem; }
      header h1 { font-size: 1rem; }
      .category { padding: 0 0.5rem 0.75rem; margin-bottom: 0.75rem; }
      .category-title { font-size: 0.9375rem; }
      .row-header { grid-template-columns: 1fr 2.25rem 3rem 8rem; gap: 0.25rem 0.4rem; font-size: 0.55rem; }
      .row { grid-template-columns: 1fr 2.25rem 3rem 8rem; gap: 0.25rem 0.4rem; padding: 0.4rem 0; font-size: 0.8125rem; }
      .row-qty .qty-btn { width: 2.5rem; height: 2.5rem; min-width: 2.5rem; min-height: 2.5rem; font-size: 1.25rem; }
      .row-qty input { width: 2.5rem; min-height: 2.5rem; }
      .total-wrap { flex-direction: column; align-items: stretch; padding: 0.6rem 0.75rem; margin: 0 -0.5rem -1.25rem -0.5rem; gap: 0.5rem; }
      .total-wrap .discount-row, .total-wrap .shifts-row { margin-left: 0; margin-top: 0.25rem; }
      .total-wrap .btn-pdf { width: 100%; min-height: 2.75rem; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-project { max-width: none; }
      .error { padding: 0.6rem 0.75rem; font-size: 0.8125rem; }
    }

    @media (max-width: 400px) and (max-height: 500px) {
      .total-wrap { position: relative; }
    }
  </style>
  <!-- pdfMake подгружается по клику «Смета (PDF)», чтобы не замедлять первую загрузку -->
</head>
<body>
  <div class="wrap">
    <header><h1>Прайс техники Zomkin Rental</h1></header>

    <div id="error" class="error" style="display: none;"></div>
    <div id="content"></div>
  </div>

  <script>
    // PDF: pdfMake (https://pdfmake.github.io/docs/) — UTF-8, кириллица, символы ₽ € % №.
    // Шрифт Roboto встроен в vfs_fonts.min.js, задаётся в defaultStyle: { font: 'Roboto' }.
    // Пример текста в PDF: 'Смета аренды техники', 'Позиция', 'Цена, ₽', 'Итого (за смену): … ₽'.
    (function () {
      // Ссылка на актуальный лист: Файл → Опубликовать в интернет → нужный лист (gid) → CSV
      const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA9E92AjFTcJOFrCtWKVnnKCfB5qlZ2BfSCsiRx2NtI1nMNHMjrLzXNPAILtoTFbHfr4Y0red9mxtv/pub?output=csv';
      const CORS_PROXIES = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?'
      ];
      // Структура вашей Google-таблицы:
      // A — категория, B — название, C — количество в наличии, D — комментарий, E — цена
      const START_ROW = 2; // 1-я строка — шапка таблицы
      const COLS = { CATEGORY: 0, NAME: 1, QTY: 2, COMMENT: 3, PRICE: 4 };

      const errorEl = document.getElementById('error');
      const contentEl = document.getElementById('content');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = msg ? 'block' : 'none';
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let cell = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const next = text[i + 1];
          if (ch === '"') {
            if (inQuotes && next === '"') { cell += '"'; i++; }
            else { inQuotes = !inQuotes; }
          } else if (ch === ',' && !inQuotes) {
            row.push(cell.trim()); cell = '';
          } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
            if (ch === '\r' && next === '\n') i++;
            row.push(cell.trim());
            if (row.some(c => c !== '')) rows.push(row);
            row = []; cell = '';
          } else {
            cell += ch;
          }
        }
        row.push(cell.trim());
        if (row.some(c => c !== '')) rows.push(row);
        return rows;
      }

      function parsePrice(v) {
        if (v == null || v === '') return null;
        const s = String(v).trim().replace(/\s/g, '').replace(/\u00A0/g, '').replace(',', '.');
        const n = parseFloat(s);
        return Number.isFinite(n) && n >= 0 ? n : null;
      }

      function parseQty(v) {
        if (v == null || v === '') return null;
        const n = parseInt(String(v).trim().replace(/\s/g, ''), 10);
        return Number.isFinite(n) && n >= 0 ? n : null;
      }

      function buildItems(rows) {
        const byCategory = {};

        for (let i = START_ROW - 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const categoryCell = (r[COLS.CATEGORY] || '').trim();
          const name = (r[COLS.NAME] || '').trim();
          const qty = parseQty(r[COLS.QTY]);
          const price = parsePrice(r[COLS.PRICE]);
          let comment = (r[COLS.COMMENT] || '').trim() || null;

          // Если строка похожа на шапку таблицы — пропускаем.
          const normalizedCategory = categoryCell.toLowerCase();
          const normalizedName = name.toLowerCase();
          if (
            normalizedCategory === 'категория' ||
            normalizedName === 'название' ||
            normalizedName === 'наименование' ||
            normalizedName === 'оборудование'
          ) continue;

          // Каждая позиция берёт категорию строго из столбца A этой же строки.
          // Пустой столбец A не наследует предыдущую категорию.
          const category = categoryCell || 'Без категории';

          // Строка без названия — не позиция.
          if (!name) continue;

          if (comment && /^[\s\-–—]*$/.test(comment)) comment = null;

          // В смету попадают только позиции с нормальной ценой.
          if (price == null) continue;

          if (!byCategory[category]) byCategory[category] = [];
          byCategory[category].push({
            name,
            quantity: Math.max(0, qty ?? 0),
            price,
            comment
          });
        }
        return byCategory;
      }

      function formatPrice(n) {
        return n.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      }

      function render(byCategory) {
        const categories = Object.keys(byCategory);
        if (categories.length === 0) {
          contentEl.innerHTML = '<p class="loading">Нет позиций. Проверьте ссылку на таблицу и что лист опубликован в интернет.</p>';
          return;
        }

        let html = '<div class="toolbar"><div class="toolbar-project"><label for="projectName">Проект</label><input type="text" id="projectName" placeholder="Название проекта" maxlength="200"></div><button type="button" class="btn-clear" id="btnClear">Очистить выбор</button></div>';
        const inputs = [];
        let rowIndex = 0;

        categories.forEach((cat, catIndex) => {
          const items = byCategory[cat];
          html += '<div class="category" data-category="' + escapeHtml(cat) + '"><div class="category-title">' + escapeHtml(cat) + '</div>';
          html += '<div class="row-header"><span>Позиция</span><span class="row-header-availability">Наличие</span><span class="row-header-price">Цена</span><span class="row-header-qty">В заказ</span></div>';
          items.forEach((item, idx) => {
            const id = 'qty-' + rowIndex++;
            html += '<div class="row">';
            html += '<div class="row-name">' + escapeHtml(item.name) + (item.comment ? '<span>' + escapeHtml(item.comment) + '</span>' : '') + '</div>';
            html += '<div class="row-availability">' + item.quantity + '</div>';
            html += '<div class="row-price">' + formatPrice(item.price) + ' ₽</div>';
            html += '<div class="row-qty"><button type="button" class="qty-btn qty-minus" aria-label="Уменьшить" data-for="' + id + '">−</button><input type="number" min="0" max="' + item.quantity + '" value="0" data-price="' + item.price + '" id="' + id + '"><button type="button" class="qty-btn qty-plus" aria-label="Увеличить" data-for="' + id + '">+</button></div>';
            html += '</div>';
            inputs.push({ id, price: item.price });
          });
          html += '</div>';
        });

        html += '<div class="total-wrap">';
        html += '<div class="total-left"><div class="label">Итого с учетом количества смен</div><div class="sum" id="totalSum" role="status" aria-live="polite">0 ₽</div><div class="sum-discount" id="totalSumDiscount" style="display: none;"></div></div>';
        html += '<div class="shifts-row"><label class="label" for="shiftCount">Смены</label><input type="number" min="1" step="0.5" value="1" class="shifts-input" id="shiftCount"></div>';
        html += '<div class="discount-row"><label class="label" for="discountPct">Скидка</label><input type="number" min="0" max="100" step="0.5" placeholder="0" class="discount-input" id="discountPct"> <span class="label">%</span></div>';
        html += '<button type="button" class="btn-pdf" id="btnPdf">Смета (PDF)</button></div>';
        contentEl.innerHTML = html;

        function getDiscountPct() {
          const el = document.getElementById('discountPct');
          if (!el) return 0;
          const v = parseFloat(String(el.value).replace(',', '.')) || 0;
          return Math.min(100, Math.max(0, v)) / 100;
        }

        function getShiftCount() {
          const el = document.getElementById('shiftCount');
          if (!el) return 1;
          const v = parseFloat(String(el.value).replace(',', '.')) || 1;
          return Math.max(1, v);
        }

        function updateTotal() {
          let sum = 0;
          inputs.forEach(({ id, price }) => {
            const el = document.getElementById(id);
            if (el) sum += (parseInt(el.value, 10) || 0) * price;
          });
          const shifts = getShiftCount();
          const totalBeforeDiscount = sum * shifts;
          const totalEl = document.getElementById('totalSum');
          if (totalEl) totalEl.textContent = formatPrice(totalBeforeDiscount) + ' ₽';
          const discountPct = getDiscountPct();
          const discountEl = document.getElementById('totalSumDiscount');
          if (discountEl) {
            if (sum > 0) {
              const withDiscount = totalBeforeDiscount * (1 - discountPct);
              discountEl.textContent = 'За смену: ' + formatPrice(sum) + ' ₽ × ' + shifts + ' = ' + formatPrice(totalBeforeDiscount) + ' ₽' + (discountPct > 0 ? ' · со скидкой: ' + formatPrice(withDiscount) + ' ₽' : '');
              discountEl.style.display = 'block';
            } else {
              discountEl.style.display = 'none';
            }
          }
        }

        function setQtyButtonsState(inputEl) {
          if (!inputEl) return;
          const wrap = inputEl.closest('.row-qty');
          if (!wrap) return;
          const minusBtn = wrap.querySelector('.qty-minus');
          const plusBtn = wrap.querySelector('.qty-plus');
          const val = parseInt(inputEl.value, 10) || 0;
          const max = parseInt(inputEl.getAttribute('max'), 10) || 0;
          if (minusBtn) minusBtn.disabled = val <= 0;
          if (plusBtn) plusBtn.disabled = max <= 0 || val >= max;
        }
        function setupQtyStepper(inputEl) {
          if (!inputEl) return;
          const wrap = inputEl.closest('.row-qty');
          if (!wrap) return;
          const minusBtn = wrap.querySelector('.qty-minus');
          const plusBtn = wrap.querySelector('.qty-plus');
          minusBtn.addEventListener('click', function () {
            const v = Math.max(0, (parseInt(inputEl.value, 10) || 0) - 1);
            inputEl.value = v;
            inputEl.dispatchEvent(new Event('input', { bubbles: true }));
            setQtyButtonsState(inputEl);
          });
          plusBtn.addEventListener('click', function () {
            const max = parseInt(inputEl.getAttribute('max'), 10) || 0;
            const v = Math.min(max, (parseInt(inputEl.value, 10) || 0) + 1);
            inputEl.value = v;
            inputEl.dispatchEvent(new Event('input', { bubbles: true }));
            setQtyButtonsState(inputEl);
          });
          inputEl.addEventListener('input', function () { setQtyButtonsState(inputEl); });
          setQtyButtonsState(inputEl);
        }
        inputs.forEach(({ id }) => {
          const el = document.getElementById(id);
          if (el) {
            el.addEventListener('input', updateTotal);
            setupQtyStepper(el);
          }
        });
        const discountInput = document.getElementById('discountPct');
        if (discountInput) discountInput.addEventListener('input', updateTotal);
        const shiftInput = document.getElementById('shiftCount');
        if (shiftInput) shiftInput.addEventListener('input', updateTotal);
        updateTotal();

        const btnClear = document.getElementById('btnClear');
        if (btnClear) {
          btnClear.onclick = function () {
            document.querySelectorAll('.row-qty input').forEach(function (inp) {
              inp.value = 0;
              inp.dispatchEvent(new Event('input'));
            });
            const dp = document.getElementById('discountPct');
            if (dp) { dp.value = ''; dp.dispatchEvent(new Event('input')); }
            const sc = document.getElementById('shiftCount');
            if (sc) { sc.value = '1'; sc.dispatchEvent(new Event('input')); }
          };
        }
        const btnPdf = document.getElementById('btnPdf');
        if (btnPdf) {
          btnPdf.onclick = function () {
            var btn = this;
            var origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Подготовка…';
            loadPdfMake().then(function () {
              btn.textContent = origText;
              btn.disabled = false;
              downloadPdf(formatPrice);
            }).catch(function (err) {
              btn.textContent = origText;
              btn.disabled = false;
              alert('Не удалось загрузить библиотеку PDF: ' + (err.message || err));
            });
          };
        }
      }

      function downloadPdf(formatPrice) {
        const rows = [];
        let total = 0;
        document.querySelectorAll('.category').forEach(catEl => {
          const catName = catEl.querySelector('.category-title');
          if (!catName) return;
          catEl.querySelectorAll('.row').forEach(rowEl => {
            const input = rowEl.querySelector('.row-qty input');
            const nameEl = rowEl.querySelector('.row-name');
            const priceEl = rowEl.querySelector('.row-price');
            if (!input || !nameEl || !priceEl) return;
            const qty = parseInt(input.value, 10) || 0;
            if (qty <= 0) return;
            const name = (nameEl.childNodes[0] && nameEl.childNodes[0].textContent) ? nameEl.childNodes[0].textContent.trim() : nameEl.textContent.trim().split('\n')[0];
            const price = parseFloat(priceEl.textContent.replace(/\s/g, '').replace(',', '.').replace(/[^\d.]/g, '')) || 0;
            const sum = qty * price;
            total += sum;
            rows.push({ category: catName.textContent.trim(), name, qty, price, sum });
          });
        });
        if (rows.length === 0) {
          alert('Отметьте хотя бы одну позицию с количеством больше 0.');
          return;
        }
        let discountPct = 0;
        const discountInput = document.getElementById('discountPct');
        if (discountInput) {
          const v = parseFloat(String(discountInput.value).replace(',', '.')) || 0;
          discountPct = Math.min(100, Math.max(0, v)) / 100;
        }
        let shiftCount = 1;
        const shiftInput = document.getElementById('shiftCount');
        if (shiftInput) {
          const v = parseFloat(String(shiftInput.value).replace(',', '.')) || 1;
          shiftCount = Math.max(1, v);
        }
        const totalForShifts = total * shiftCount;
        const totalWithDiscount = totalForShifts * (1 - discountPct);
        let projectName = '';
        const projectInput = document.getElementById('projectName');
        if (projectInput) projectName = (projectInput.value || '').trim();
        try {
          const dateStr = new Date().toLocaleDateString('ru-RU');
          const pdfTitle = projectName ? 'Смета для «' + projectName + '»' : 'Смета аренды техники';
          const subtitleLines = 'Дата: ' + dateStr + (projectName ? '\nПроект: ' + projectName : '');
          const tableBody = [
            [
              { text: 'Позиция', style: 'tableHeader' },
              { text: 'Кол-во', style: 'tableHeaderRight' },
              { text: 'Цена, ₽', style: 'tableHeaderRight' },
              { text: 'Сумма, ₽', style: 'tableHeaderRight' }
            ]
          ];
          let currentCat = '';
          rows.forEach(r => {
            if (r.category !== currentCat) {
              currentCat = r.category;
              tableBody.push([
                { text: currentCat, style: 'categoryRow', colSpan: 4 },
                '', '', ''
              ]);
            }
            const nameShort = r.name.length > 50 ? r.name.slice(0, 47) + '…' : r.name;
            tableBody.push([
              { text: nameShort, style: 'tableCell' },
              { text: String(r.qty), style: 'tableCellRight' },
              { text: formatPrice(r.price), style: 'tableCellRight' },
              { text: formatPrice(r.sum), style: 'tableCellRight' }
            ]);
          });
          function pluralizeShift(n) {
            const abs = Math.abs(n);
            if (Number.isInteger(abs)) {
              const last = abs % 10;
              const lastTwo = abs % 100;
              if (last === 1 && lastTwo !== 11) return 'смену';
              if (last >= 2 && last <= 4 && (lastTwo < 12 || lastTwo > 14)) return 'смены';
            }
            return 'смен';
          }

          const shiftLabel = formatPrice(shiftCount) + ' ' + pluralizeShift(shiftCount);
          const discountPercentText = formatPrice(discountPct * 100) + '%';
          const totalDetails = 'Расчет за ' + shiftLabel + ': ' + formatPrice(totalForShifts) + ' ₽';

          const totalBlock = [
            { text: totalDetails, style: 'totalMain' },
            {
              table: {
                widths: ['*', 130],
                body: [
                  [
                    { text: 'Скидка', style: 'summaryLabel' },
                    { text: discountPercentText, style: 'summaryValue' }
                  ],
                  [
                    { text: 'Итоговая сумма', style: 'summaryLabelBold' },
                    { text: formatPrice(totalWithDiscount) + ' ₽', style: 'summaryValueBold' }
                  ]
                ]
              },
              layout: {
                hLineWidth: function () { return 0.5; },
                vLineWidth: function () { return 0.5; },
                hLineColor: function () { return '#dddddd'; },
                vLineColor: function () { return '#dddddd'; },
                paddingLeft: function () { return 8; },
                paddingRight: function () { return 8; },
                paddingTop: function () { return 6; },
                paddingBottom: function () { return 6; }
              },
              margin: [0, 10, 0, 0]
            }
          ];

          const docDef = {
            pageSize: 'A4',
            pageMargins: [50, 56, 50, 56],
            defaultStyle: { font: 'Roboto', fontSize: 10 },
            styles: {
              header: { fontSize: 18, bold: true, margin: [0, 0, 0, 4] },
              subtitle: { fontSize: 9, color: '#555', margin: [0, 0, 0, 14] },
              tableHeader: { bold: true, fontSize: 10, fillColor: '#1a1a1a', color: '#ffffff' },
              tableHeaderRight: { bold: true, fontSize: 10, fillColor: '#1a1a1a', color: '#ffffff', alignment: 'right' },
              categoryRow: { bold: true, fontSize: 10, fillColor: '#f0f0f0' },
              tableCell: { fontSize: 10 },
              tableCellRight: { fontSize: 10, alignment: 'right' },
              totalMain: { bold: true, fontSize: 12, margin: [0, 14, 0, 0] },
              totalDiscount: { fontSize: 11, color: '#333' },
              summaryLabel: { fontSize: 10, color: '#333' },
              summaryValue: { fontSize: 10, alignment: 'right' },
              summaryLabelBold: { fontSize: 11, bold: true, color: '#1a1a1a' },
              summaryValueBold: { fontSize: 11, bold: true, alignment: 'right' }
            },
            content: [
              { text: pdfTitle, style: 'header' },
              { text: subtitleLines, style: 'subtitle' },
              {
                table: {
                  headerRows: 1,
                  widths: ['*', 48, 72, 72],
                  body: tableBody
                },
                layout: { hLineWidth: (i, node) => (i === 0 || i === 1 || i === node.table.body.length) ? 0.5 : 0.25, vLineWidth: () => 0.25 },
                margin: [0, 0, 0, 4]
              }
            ].concat(totalBlock)
          };
          const safeName = projectName ? projectName.replace(/[^\w\s\u0400-\u04FF-]/gi, '').replace(/\s+/g, '-').slice(0, 50) : '';
          const filename = (safeName ? 'smeta-' + safeName + '-' : 'smeta-') + new Date().toISOString().slice(0, 10) + '.pdf';
          pdfMake.createPdf(docDef).download(filename);
        } catch (e) {
          alert('Ошибка при создании PDF: ' + (e.message || e));
        }
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      const fetchOptions = { cache: 'no-store', mode: 'cors' };

      function loadPdfMake() {
        if (typeof pdfMake !== 'undefined') return Promise.resolve();
        return new Promise(function (resolve, reject) {
          var s1 = document.createElement('script');
          s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js';
          s1.onload = function () {
            var s2 = document.createElement('script');
            s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js';
            s2.onload = resolve;
            s2.onerror = function () { reject(new Error('vfs_fonts')); };
            document.head.appendChild(s2);
          };
          s1.onerror = function () { reject(new Error('pdfmake')); };
          document.head.appendChild(s1);
        });
      }

      const FETCH_TIMEOUT_MS = 30000;
      async function loadPricelist() {
        showError('');
        contentEl.innerHTML = '<p class="loading">Загрузка прайса…</p>';
        try {
          const urlNoCache = CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + '_=' + Date.now();
          const encodedUrl = encodeURIComponent(urlNoCache);
          const controller = new AbortController();
          let timeoutId = setTimeout(function () { controller.abort(); }, FETCH_TIMEOUT_MS);
          const opts = { ...fetchOptions, signal: controller.signal };
          let res = await fetch(urlNoCache, opts).catch(function (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') throw new Error('Превышено время ожидания. Проверьте интернет.');
            return null;
          });
          clearTimeout(timeoutId);
          if (!res || !res.ok) {
            for (var pi = 0; pi < CORS_PROXIES.length; pi++) {
              const c2 = new AbortController();
              const t2 = setTimeout(function () { c2.abort(); }, FETCH_TIMEOUT_MS);
              res = await fetch(CORS_PROXIES[pi] + encodedUrl, { ...fetchOptions, signal: c2.signal }).catch(function (err) {
                if (err.name === 'AbortError') throw new Error('Превышено время ожидания.');
                return null;
              });
              clearTimeout(t2);
              if (res && res.ok) break;
            }
          }
          if (!res || !res.ok) throw new Error(res ? 'Сервер вернул ' + res.status : 'Проверьте интернет и откройте страницу по http(s), не с file://.');
          const text = await res.text();
          const rows = parseCSV(text);
          const byCategory = buildItems(rows);
          try {
            render(byCategory);
          } catch (renderErr) {
            console.error(renderErr);
            showError('Ошибка отображения: ' + (renderErr.message || renderErr));
          }
        } catch (e) {
          showError('Не удалось загрузить прайс. ' + (e.message || 'Проверьте интернет и обновите страницу.'));
          contentEl.innerHTML = '<p class="loading">Обновите страницу или проверьте подключение к интернету.</p>';
        }
      }
      loadPricelist();
    })();
  </script>
</body>
